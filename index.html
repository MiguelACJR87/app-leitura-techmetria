<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#031C4B">
  <title>Techmetria Leitura</title>
  
  <link rel="manifest" href="manifest.json">
  
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #031C4B; font-family: sans-serif; }
    iframe { width: 100vw; height: 100vh; border: none; display: block; }
    
    /* A Caixa Mágica de Instalação */
    #install-box {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #FFFFFF; border-radius: 20px; padding: 16px 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4); z-index: 9999;
      display: none; align-items: center; gap: 14px; width: 85%; max-width: 360px;
      border: 2px solid #1F5FAA;
    }
    #install-box img { width: 44px; height: 44px; border-radius: 12px; object-fit: contain; background: #031C4B; padding: 4px; }
    #install-box div { flex: 1; }
    #install-box h4 { margin: 0 0 4px 0; font-size: 16px; color: #031C4B; font-weight: 800; }
    #install-box p { margin: 0; font-size: 12px; color: #64748B; font-weight: 600; }
    #install-btn {
      background: #1F5FAA; color: white; border: none; padding: 10px 20px;
      border-radius: 12px; font-weight: 900; font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- O Seu App do Google -->
  <iframe src="https://script.google.com/macros/s/AKfycby1Y8FWdjRDSj2pC-J-PwD11CHxAyFJP2-f5d-nanWYxCK9kncPUR-RBRoUsXXFN6ZA/exec" allow="camera"></iframe>

  <!-- CAIXA DE INSTALAÇÃO MANUAL -->
  <div id="install-box">
    <!-- Se não achar o icon.png, ele usa a logo padrão -->
    <img src="icon.png" onerror="this.src='https://raw.githubusercontent.com/MiguelACJR87/meusassents/main/Tech_Branco-login.png'">
    <div>
      <h4>Techmetria</h4>
      <p>Instale o App Nativo</p>
    </div>
    <button id="install-btn">Instalar</button>
  </div>

  <script>
    // 1. Liga o motor do App
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }

    // 2. Sequestra a instalação do Chrome
    let deferredPrompt;
    const installBox = document.getElementById('install-box');
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      // Impede o Chrome de tentar mostrar o aviso fraco dele
      e.preventDefault();
      // Salva o evento nativo
      deferredPrompt = e;
      // Mostra a nossa caixa forçada
      installBox.style.display = 'flex';
    });

    // 3. O que acontece ao clicar no botão "Instalar"
    installBtn.addEventListener('click', async () => {
      installBox.style.display = 'none';
      // Dispara a janela oficial do Android para baixar o APK
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
    });
  </script>
</body>
</html>
