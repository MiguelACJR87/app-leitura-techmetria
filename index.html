<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#031C4B">
  <title>Techmetria Leitura</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; background: #031C4B; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; padding: 24px; }
    .logo { width: 80px; height: 80px; border-radius: 20px; object-fit: contain; background: #fff; padding: 8px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    p { font-size: 14px; color: #94A3B8; margin-bottom: 32px; }
    .btn { background: #1F5FAA; color: #fff; border: none; padding: 14px 36px; border-radius: 14px; font-weight: 800; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; transition: .2s; }
    .btn:hover { background: #2A7BD6; transform: translateY(-1px); }
    .btn-secondary { background: transparent; border: 2px solid #1F5FAA; color: #fff; margin-top: 12px; font-size: 14px; padding: 10px 24px; }
    .footer { position: fixed; bottom: 24px; font-size: 11px; color: #475569; }
    #install-box { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #fff; border-radius: 20px; padding: 16px 20px; box-shadow: 0 10px 40px rgba(0,0,0,.4); display: none; align-items: center; gap: 14px; width: 85%; max-width: 360px; border: 2px solid #1F5FAA; z-index: 9999; }
    #install-box img { width: 44px; height: 44px; border-radius: 12px; object-fit: contain; background: #031C4B; padding: 4px; }
    #install-box div { flex: 1; }
    #install-box h4 { margin: 0 0 4px; font-size: 16px; color: #031C4B; font-weight: 800; }
    #install-box p { margin: 0; font-size: 12px; color: #64748B; font-weight: 600; }
    #install-btn { background: #1F5FAA; color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 900; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <img src="icon.png" alt="Techmetria" class="logo" onerror="this.src='https://raw.githubusercontent.com/MiguelACJR87/meusassents/main/Tech_Branco-login.png'">
  <h1>Techmetria</h1>
  <p>App de leitura de energia para condomínios</p>
  <a href="https://script.google.com/macros/s/AKfycbw-Dkp6-D6LRRikPuRc0dy3Um5tjH05-X8jcsfQDUFHMtDPDQPLkhCsSUxd5goKTeIz/exec" class="btn">Abrir App</a>
  <button class="btn btn-secondary" id="open-app-btn">Abrir no Navegador</button>
  <div class="footer">Techmetria v8.2</div>

  <div id="install-box">
    <img src="icon.png" onerror="this.src='https://raw.githubusercontent.com/MiguelACJR87/meusassents/main/Tech_Branco-login.png'">
    <div>
      <h4>Techmetria</h4>
      <p>Instale o App Nativo</p>
    </div>
    <button id="install-btn">Instalar</button>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }

    var deferredPrompt;
    var installBox = document.getElementById('install-box');
    var installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      installBox.style.display = 'flex';
    });

    installBtn.addEventListener('click', async function() {
      installBox.style.display = 'none';
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    });

    document.getElementById('open-app-btn').addEventListener('click', function() {
      window.location.href = 'https://script.google.com/macros/s/AKfycbx5EmCiLEYnDI1pcg1MduQwtBxNLpY5vwZkhrleJysMSEAcx01mpNfE2w6Y22So6Q5j/exec';
    });
  </script>
</body>
</html>
